server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: erp-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/erp/**
        - id: crm-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/crm/**
        - id: supply-chain-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/supply/**
        - id: bi-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/bi/**
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:agrocam-digitrans-secret-key-2024-very-long-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info
