apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-service
  namespace: digitrans-cm
  labels:
    app: crm-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crm-service
  template:
    metadata:
      labels:
        app: crm-service
        tier: backend
    spec:
      containers:
      - name: crm-service
        image: ECR_REGISTRY/digitrans-cm/crm-service:IMAGE_TAG
        ports:
        - containerPort: 8082
          name: http
        envFrom:
        - configMapRef:
            name: digitrans-cm-config
        - secretRef:
            name: digitrans-cm-secrets
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://RDS_CRM_ENDPOINT/crm_db?useSSL=false&serverTimezone=Africa/Douala"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 90
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 60
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: crm-service
  namespace: digitrans-cm
spec:
  type: ClusterIP
  ports:
  - port: 8082
    targetPort: 8082
  selector:
    app: crm-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crm-service-hpa
  namespace: digitrans-cm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crm-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
