apiVersion: apps/v1
kind: Deployment
metadata:
  name: supply-chain-service
  namespace: digitrans-cm
  labels:
    app: supply-chain-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: supply-chain-service
  template:
    metadata:
      labels:
        app: supply-chain-service
        tier: backend
    spec:
      containers:
      - name: supply-chain-service
        image: ECR_REGISTRY/digitrans-cm/supply-chain-service:IMAGE_TAG
        ports:
        - containerPort: 8083
          name: http
        envFrom:
        - configMapRef:
            name: digitrans-cm-config
        - secretRef:
            name: digitrans-cm-secrets
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://RDS_SUPPLY_ENDPOINT/supply_db?useSSL=false&serverTimezone=Africa/Douala"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8083
          initialDelaySeconds: 90
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8083
          initialDelaySeconds: 60
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: supply-chain-service
  namespace: digitrans-cm
spec:
  type: ClusterIP
  ports:
  - port: 8083
    targetPort: 8083
  selector:
    app: supply-chain-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: supply-chain-service-hpa
  namespace: digitrans-cm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: supply-chain-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bi-service
  namespace: digitrans-cm
  labels:
    app: bi-service
    tier: analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bi-service
  template:
    metadata:
      labels:
        app: bi-service
        tier: analytics
    spec:
      containers:
      - name: bi-service
        image: ECR_REGISTRY/digitrans-cm/bi-service:IMAGE_TAG
        ports:
        - containerPort: 8084
          name: http
        envFrom:
        - configMapRef:
            name: digitrans-cm-config
        - secretRef:
            name: digitrans-cm-secrets
        env:
        - name: ERP_DB_URL
          value: "jdbc:mysql://RDS_ERP_ENDPOINT/erp_db?useSSL=false&serverTimezone=Africa/Douala"
        - name: CRM_DB_URL
          value: "jdbc:mysql://RDS_CRM_ENDPOINT/crm_db?useSSL=false&serverTimezone=Africa/Douala"
        - name: SUPPLY_DB_URL
          value: "jdbc:mysql://RDS_SUPPLY_ENDPOINT/supply_db?useSSL=false&serverTimezone=Africa/Douala"
        resources:
          requests:
            memory: "768Mi"
            cpu: "500m"
          limits:
            memory: "1.5Gi"
            cpu: "1500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8084
          initialDelaySeconds: 90
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8084
          initialDelaySeconds: 60
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bi-service
  namespace: digitrans-cm
spec:
  type: ClusterIP
  ports:
  - port: 8084
    targetPort: 8084
  selector:
    app: bi-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bi-service-hpa
  namespace: digitrans-cm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bi-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
