name: DIGITRANS-CM CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: af-south-1
  EKS_CLUSTER_NAME: digitrans-cm-eks-prod
  DOCKER_REGISTRY: ${{ secrets.wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY }}.dkr.ecr.af-south-1.amazonaws.com
  JAVA_VERSION: '17'

jobs:
  # Job 1: Build and Test
  build-and-test:
    name: Build and Test Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, erp-service, crm-service, supply-chain-service, bi-service]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: |
          cd ${{ matrix.service }}
          mvn clean package -DskipTests
        working-directory: .

      - name: Run unit tests
        run: |
          cd ${{ matrix.service }}
          mvn test
        working-directory: .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar
          retention-days: 1

  # Job 2: Security Scan
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Job 3: Build and Push Docker Images
  build-docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        service: [api-gateway, erp-service, crm-service, supply-chain-service, bi-service]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets. }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names digitrans-cm/${{ matrix.service }} --region ${{ env.AWS_REGION }} || \
          aws ecr create-repository --repository-name digitrans-cm/${{ matrix.service }} --region ${{ env.AWS_REGION }}

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd ${{ matrix.service }}
          docker build -t $ECR_REGISTRY/digitrans-cm/${{ matrix.service }}:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/digitrans-cm/${{ matrix.service }}:$IMAGE_TAG $ECR_REGISTRY/digitrans-cm/${{ matrix.service }}:latest
          docker push $ECR_REGISTRY/digitrans-cm/${{ matrix.service }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/digitrans-cm/${{ matrix.service }}:latest

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/digitrans-cm/${{ matrix.service }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # Job 4: Deploy to Kubernetes (EKS)
  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://digitrans-cm.agrocam.cm
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_IDAWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE
 }}
          aws-secret-access-key: ${{ secrets.wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY}}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Deploy to Kubernetes
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.af-south-1.amazonaws.com
        run: |
          # Update image tags in Kubernetes manifests
          for service in api-gateway erp-service crm-service supply-chain-service bi-service; do
            sed -i "s|IMAGE_TAG|$IMAGE_TAG|g" k8s/$service-deployment.yaml
            sed -i "s|ECR_REGISTRY|$ECR_REGISTRY|g" k8s/$service-deployment.yaml
            kubectl apply -f k8s/$service-deployment.yaml
            kubectl apply -f k8s/$service-service.yaml
          done

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/api-gateway -n digitrans-cm --timeout=5m
          kubectl rollout status deployment/erp-service -n digitrans-cm --timeout=5m
          kubectl rollout status deployment/crm-service -n digitrans-cm --timeout=5m
          kubectl rollout status deployment/supply-chain-service -n digitrans-cm --timeout=5m
          kubectl rollout status deployment/bi-service -n digitrans-cm --timeout=5m

      - name: Run smoke tests
        run: |
          kubectl run smoke-test --image=curlimages/curl:latest --rm -i --restart=Never -- \
            curl -f http://api-gateway-service.digitrans-cm.svc.cluster.local:8080/actuator/health || exit 1

  # Job 5: Performance Testing
  performance-test:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: deploy-to-eks
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run load tests
        env:
          API_ENDPOINT: ${{ secrets.API_GATEWAY_URL }}
        run: |
          k6 run --vus 50 --duration 2m tests/load-test.js

  # Job 6: Notify deployment status
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-to-eks, performance-test]
    if: always()
    
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            DIGITRANS-CM Deployment Status: ${{ job.status }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Branch: ${{ github.ref }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()
