server.port=8084
spring.application.name=bi-service

# ERP DataSource
spring.datasource.erp.url=${ERP_DB_URL:jdbc:mysql://localhost:3306/erp_db?useSSL=false&serverTimezone=Africa/Douala&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.erp.username=${DB_USER:root}
spring.datasource.erp.password=${DB_PASS:}
spring.datasource.erp.driver-class-name=com.mysql.cj.jdbc.Driver

# CRM DataSource
spring.datasource.crm.url=${CRM_DB_URL:jdbc:mysql://localhost:3306/crm_db?useSSL=false&serverTimezone=Africa/Douala&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.crm.username=${DB_USER:root}
spring.datasource.crm.password=${DB_PASS:}
spring.datasource.crm.driver-class-name=com.mysql.cj.jdbc.Driver

# Supply DataSource
spring.datasource.supply.url=${SUPPLY_DB_URL:jdbc:mysql://localhost:3306/supply_db?useSSL=false&serverTimezone=Africa/Douala&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.supply.username=${DB_USER:root}
spring.datasource.supply.password=${DB_PASS:}
spring.datasource.supply.driver-class-name=com.mysql.cj.jdbc.Driver

# Disable JPA auto-config (BI uses raw JDBC)
spring.jpa.open-in-view=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# JWT
jwt.secret=${JWT_SECRET:agrocam-digitrans-secret-key-2024-very-long-secret}

# Actuator
management.endpoints.web.exposure.include=health,info

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
